<h1>Category
  <button>
    Add Category
  </button>
</h1>
<hr>
<table>
  <thead>
    <tr>
      <td>
        <!-- # -->
      </td>
      <td>
        Name
      </td>
      <td>
        Priority
      </td>
      <td>
        <!-- Actions -->
      </td>
    </tr>
  </thead>
  <tbody>
    @for(row of mockData; track $index){
    <tr>
      <td>{{$index +1}}</td>
      <td>
        {{row.categoryName}}
      </td>
      <td>
        {{row.priority}}
      </td>
      <td>
        <button>Edit</button>
        <button>Delete</button>
      </td>
    </tr>

    }
  </tbody>
</table>
<hr>
