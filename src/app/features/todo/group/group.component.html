<h1>Groups
  <button>
    Add Group
  </button>
</h1>
<hr>
<table>
  <thead>
    <tr>
      <td>
        <!-- # -->
      </td>
      <td>
        Name
      </td>
      <td>
        Priority
      </td>
      <td>
        Items
      </td>
      <td>
      Category
      </td>
      <td>
        <!-- Actions -->
      </td>
    </tr>
  </thead>
  <tbody>
    @for(group of groups(); track $index){
    <tr>
      <td>{{$index +1}}</td>
      <td>
        {{group.groupName}}
      </td>
      <td>
        {{group.priority}}
      </td>
      <td>
        0
      </td>
      <td>
        {{group.category.categoryName}}
      </td>
      <td>
        <button>Edit</button>
        <button>Delete</button>
      </td>
    </tr>

    }
  </tbody>
</table>
<hr>
