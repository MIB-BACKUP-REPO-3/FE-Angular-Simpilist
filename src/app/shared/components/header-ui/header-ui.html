<header class="header">
  <div class="logo">
    Simpilist
  </div>
  <nav class="nav">
    @for (item of menu(); track $index) {
    @if(item.isButton){
    <button (click)="itemClick.emit(item)">
      @if(item.icon){
      <img src={{item.icon}} alt="">
      }
      {{ item.label }}
    </button>
    }@else {
    <a (click)="itemClick.emit(item)">
      @if(item.icon){
      <img src={{item.icon}} alt="">
      }
      {{ item.label }}
    </a>
    }
    }
  </nav>
</header>
